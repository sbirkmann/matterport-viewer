server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: alles Nicht-Datei -> index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Modelldaten (Panoramen, Mesh, Grundrisse) mit langem Cache
    location /model/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800";
    }

    types {
        application/wasm            wasm;
        model/gltf-binary           glb;
        image/jpeg                  jpg jpeg;
        image/png                   png;
        application/json            json;
        text/html                   html;
        text/css                    css;
        application/javascript      js;
    }
    default_type application/octet-stream;
}
